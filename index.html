<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/hud.css">
</head>
<body>

    <div class="newHud-2">
        <img src="img/logo-white.png" class="newHud-logo" style="visibility:hidden">
        
        <div class="newHud-2-container">
            <div class="newHud-2-weapon-block">
                <img src="img/weapon_ak.png" class="newHud-2-weapon-img" id="hud-weapon">
                <div class="newHud-2-weapon-ammo" id="hud-ammo">30/120</div>
            </div>

            <div class="newHud-2-block">
                <div class="newHud-2-health-armour-block">
                    <div class="newHud-2-health-block">
                        <img src="img/hud/health.png" class="newHud-1-health-img">
                        <div class="newHud-2-health-linebg">
                            <div class="newHud-2-health-line" id="hud-health"></div>
                        </div>
                    </div>
                    <div class="newHud-2-armour-block">
                        <img src="img/hud/armour.png" class="newHud-1-armour-img">
                        <div class="newHud-2-armour-linebg">
                            <div class="newHud-2-armour-line" id="hud-armour"></div>
                        </div>
                    </div>
                </div>
                <div class="newHud-2-money-cash" id="hud-money-cash">
                    <img src="img/hud/money-cash.png"><span>1.000.000</span>
                </div>
                <div class="newHud-2-money-bank" id="hud-money-bank">
                    <img src="img/hud/money-bank.png"><span>1.000.000</span>
                </div>
            </div>

            <div class="newHud-2-eat-block">
                <div class="newHud-2-eat-linebg">
                    <div class="newHud-2-eat-line" id="hud-height-food" style="height:50%"></div>
                </div>
                <img src="img/hud/eat.png">
            </div>

            <div class="newHud-2-water-block">
                <div class="newHud-2-water-linebg">
                    <div class="newHud-2-water-line" id="hud-height-drink" style="height:50%"></div>
                </div>
                <img src="img/hud/water.png">
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
